<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="760" viewBox="0 0 1120 760">
  <defs>
    <filter id="softShadow" x="-20%" y="-30%" width="140%" height="180%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#52616d" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f4f6f8; }
      .panel { fill: #ffffff; stroke: #e5e9ee; }
      .grid { stroke: #e3e8ed; stroke-width: 1; }
      .title { font-family: "Microsoft YaHei", "Segoe UI", sans-serif; font-size: 20px; font-weight: 700; fill: #23313d; }
      .desc { font-family: "Microsoft YaHei", "Segoe UI", sans-serif; font-size: 13px; fill: #71808d; }
      .tabText { font-family: "Segoe UI", "Microsoft YaHei", sans-serif; font-size: 17px; font-weight: 650; fill: #263746; }
      .mutedText { font-family: "Segoe UI", "Microsoft YaHei", sans-serif; font-size: 15px; font-weight: 520; fill: #697782; }
      .small { font-family: "Microsoft YaHei", "Segoe UI", sans-serif; font-size: 12px; fill: #7b8791; }
      .tab { fill: #f9fafb; stroke: #e1e6eb; }
      .activeBorder { stroke: #b9c9d6; }
      .blue { fill: #6f8fa6; }
      .blueStroke { stroke: #6f8fa6; }
      .blueSoft { fill: #eef4f7; }
      .yellow { fill: #c4a96a; }
      .green { fill: #83a391; }
      .red { fill: #b97878; }
      .gray { fill: #9aa3a8; }
    </style>
  </defs>

  <rect class="bg" width="1120" height="760"/>
  <text x="40" y="48" class="title">画布页签选中态方案预览</text>
  <text x="40" y="73" class="desc">都使用低饱和莫兰迪蓝；状态色只作为小提示，不喧宾夺主。</text>

  <g transform="translate(40 108)">
    <rect class="panel" width="500" height="265" rx="14"/>
    <text x="24" y="36" class="title">A. 细上沿浮层</text>
    <text x="24" y="58" class="desc">保留卡片感，但线条更轻，阴影更克制。</text>
    <rect x="24" y="92" width="452" height="128" fill="#f6f8fa" stroke="#e1e6eb"/>
    <path class="grid" d="M24 156H476M100 92V220M180 92V220M260 92V220M340 92V220M420 92V220"/>
    <g transform="translate(42 64)">
      <rect class="tab" x="0" y="42" width="118" height="42" rx="10"/>
      <circle class="green" cx="18" cy="63" r="5"/>
      <text x="30" y="68" class="mutedText">main</text>
      <rect x="126" y="34" width="208" height="52" rx="12" fill="#fff" stroke="#bed0dd" filter="url(#softShadow)"/>
      <rect class="blue" x="142" y="34" width="176" height="3" rx="2"/>
      <circle class="yellow" cx="148" cy="60" r="6"/>
      <text x="163" y="66" class="tabText">test_202607...</text>
      <text x="314" y="66" class="mutedText">x</text>
      <rect class="tab" x="342" y="42" width="54" height="42" rx="10"/>
      <text x="361" y="68" class="tabText">+</text>
    </g>
    <text x="24" y="246" class="small">适合：想保留当前方向，但去掉笨重感。</text>
  </g>

  <g transform="translate(580 108)">
    <rect class="panel" width="500" height="265" rx="14"/>
    <text x="24" y="36" class="title">B. 左侧书签线</text>
    <text x="24" y="58" class="desc">选中态靠左侧蓝线识别，干净，不压状态色。</text>
    <rect x="24" y="92" width="452" height="128" fill="#f6f8fa" stroke="#e1e6eb"/>
    <path class="grid" d="M24 156H476M100 92V220M180 92V220M260 92V220M340 92V220M420 92V220"/>
    <g transform="translate(42 64)">
      <rect class="tab" x="0" y="42" width="118" height="42" rx="8"/>
      <circle class="green" cx="18" cy="63" r="5"/>
      <text x="30" y="68" class="mutedText">main</text>
      <rect x="126" y="38" width="208" height="48" rx="9" fill="#fff" stroke="#c4d0da"/>
      <rect class="blue" x="126" y="46" width="3" height="32" rx="2"/>
      <circle class="yellow" cx="148" cy="62" r="6"/>
      <text x="163" y="67" class="tabText">test_202607...</text>
      <text x="314" y="67" class="mutedText">x</text>
      <rect class="tab" x="342" y="42" width="54" height="42" rx="8"/>
      <text x="361" y="68" class="tabText">+</text>
    </g>
    <text x="24" y="246" class="small">适合：列表感、工程工具感更强，最稳。</text>
  </g>

  <g transform="translate(40 420)">
    <rect class="panel" width="500" height="265" rx="14"/>
    <text x="24" y="36" class="title">C. 底部墨线</text>
    <text x="24" y="58" class="desc">去卡片化，只用底部蓝线和字重表达选中。</text>
    <rect x="24" y="92" width="452" height="128" fill="#f6f8fa" stroke="#e1e6eb"/>
    <path class="grid" d="M24 156H476M100 92V220M180 92V220M260 92V220M340 92V220M420 92V220"/>
    <g transform="translate(42 64)">
      <rect x="0" y="42" width="118" height="42" rx="7" fill="#f8fafb"/>
      <circle class="green" cx="18" cy="63" r="5"/>
      <text x="30" y="68" class="mutedText">main</text>
      <rect x="126" y="42" width="208" height="42" rx="7" fill="#fff"/>
      <rect class="blue" x="142" y="82" width="176" height="3" rx="2"/>
      <circle class="yellow" cx="148" cy="63" r="6"/>
      <text x="163" y="68" class="tabText">test_202607...</text>
      <text x="314" y="68" class="mutedText">x</text>
      <rect x="342" y="42" width="54" height="42" rx="7" fill="#f8fafb"/>
      <text x="361" y="68" class="tabText">+</text>
    </g>
    <text x="24" y="246" class="small">适合：最轻、最不花，长期看不累。</text>
  </g>

  <g transform="translate(580 420)">
    <rect class="panel" width="500" height="265" rx="14"/>
    <text x="24" y="36" class="title">D. 轻填充面</text>
    <text x="24" y="58" class="desc">用浅蓝灰底强调当前页，识别度最高。</text>
    <rect x="24" y="92" width="452" height="128" fill="#f6f8fa" stroke="#e1e6eb"/>
    <path class="grid" d="M24 156H476M100 92V220M180 92V220M260 92V220M340 92V220M420 92V220"/>
    <g transform="translate(42 64)">
      <rect class="tab" x="0" y="42" width="118" height="42" rx="8"/>
      <circle class="green" cx="18" cy="63" r="5"/>
      <text x="30" y="68" class="mutedText">main</text>
      <rect x="126" y="38" width="208" height="48" rx="9" class="blueSoft" stroke="#b8cad5"/>
      <rect class="blue" x="126" y="38" width="208" height="2" rx="2"/>
      <circle class="yellow" cx="148" cy="62" r="6"/>
      <text x="163" y="67" class="tabText">test_202607...</text>
      <text x="314" y="67" class="mutedText">x</text>
      <rect class="tab" x="342" y="42" width="54" height="42" rx="8"/>
      <text x="361" y="68" class="tabText">+</text>
    </g>
    <text x="24" y="246" class="small">适合：你希望选中态很明显，但仍保持克制。</text>
  </g>
</svg>
